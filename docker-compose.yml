services:
  db:
    image: postgres:16
    container_name: mrsw-db
    environment:
      POSTGRES_USER: mrsw
      POSTGRES_PASSWORD: mrsw
      POSTGRES_DB: mrsw
    ports:
      - "5432:5432"
    volumes:
      - mrsw_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mrsw"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  mrsw_pgdata:
