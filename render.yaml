# Render Blueprint — builds and serves the full React prototype as a static site.
# Render runs the npm build on its servers (nothing runs on your machine).
#
# You can either use this blueprint (New -> Blueprint) or just create a
# Static Site in the dashboard with the same Build Command / Publish Directory.

services:
  - type: web
    runtime: static
    name: mrsw-rentconnect-web
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    # Single-page app: send unknown paths back to index.html.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
